name: hookah_mix_master
description: "Mobile app for hookah tobacco mixing — catalog, smart recommender, mix builder."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.1
  firebase_crashlytics: ^4.3.1
  firebase_analytics: ^11.4.4

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Localization
  intl: ^0.20.2

  # UI utilities
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

  # Logging
  logger: ^2.5.0

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.13.0

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
